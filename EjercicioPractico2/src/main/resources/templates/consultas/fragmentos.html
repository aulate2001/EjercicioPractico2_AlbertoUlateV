<!-- fragmento 1 para Agregar producto en ventana modal -->
<section th:fragment="tabs" class="py-3 mb-4">
    <div class="d-flex justify-content-center px-5"> 
        <ul class="nav nav-underline">
            <li class="nav-item">
                <a th:href="@{/consultas}" 
                   th:classappend="${idCategoriaActual == null} ? 'active'"
                   class="nav-link" 
                   aria-current="page">
                    Todos los Eventos
                </a>
            </li>
        </ul>
    </div>
</section>

<!-- fragmento 2 para el listado de tarjetas de productos -->
<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${eventos}" class="col">
            <div class="card h-100 shadow-sm">
                <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                    <!-- No image for events -->
                    <h4 class="text-center">Evento</h4>
                </div>
                <div class="card-header bg-white">
                    <h5 class="card-title text-center text-truncate mb-0" th:text="${p.nombre}">Título</h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate" th:text="${p.descripcion}">Detalle</p>
                    <p class="card-text text-muted" th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy')}">Fecha</p>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <div class="fw-bold">
                        <span class="text-success h5" th:text="${p.capacidad}">Capacidad</span>
                        <span th:if="${p.activo}" class="badge text-bg-success ms-2">Activo</span>
                        <span th:unless="${p.activo}" class="badge text-bg-danger ms-2">Inactivo</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- fragmento 3 para mostrar los 3 formularios de las consultas -->
<section th:fragment='consultas' class='row row-cols-4 p-2'>
    <div th:replace="~{consultas/fragmentos :: formConsulta('primary',#{consultas.derivadas},'/consultas/consultaDerivada')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('warning',#{consultas.jpql},'/consultas/consultaJPQL')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('success',#{consultas.sql},'/consultas/consultaSQL')}"/>

    <div class='card p-2'>
        <div class="card-header text-center bg-info text-white">
            <h5>Consulta por Actividad</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/consultas/consultaStock}" method="post">
                <div class="mb-3">
                    <label>Seleccione una opcion:</label>
                    <select name="stock" class="form-select" required>
                        <option value="1" th:selected="${stockSeleccionado != null and stockSeleccionado == 1}">Activos</option>
                        <option value="2" th:selected="${stockSeleccionado != null and stockSeleccionado == 2}">Inactivos</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-info text-white">
                    <i class="fa-solid fa-filter"></i> Filtrar
                </button>
            </form>
        </div>
    </div>
</section>

<!-- fragmento 4 para mostrar el formulario factorizado -->
<div th:fragment='formConsulta(colorForm, textoForm, urlForm)'>
    <form method="post" th:action='@{${urlForm}}' class='was-validated'>
        <div class='card p-2'>
            <div class="card-header text-center text-white" th:classappend="${'bg-'+colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>
            <div class="card-body">
                <div class='mb-3'>
                    <label>Capacidad Inferior</label>
                    <input type="number" name='capacidadInf' th:value='${capacidadInf}'
                           class='form-control' min="0" required/>
                </div>
                <div class='mb-3'>
                    <label>Capacidad Superior</label>
                    <input type="number" name='capacidadSup' th:value='${capacidadSup}'
                           class='form-control' min="0" required/>
                </div>
            </div>
            <div class="card-footer text-center">
                <button type='submit' class='btn text-white' th:classappend="${'btn-'+colorForm}">
                    <i class='fa-solid fa-magnifying-glass'></i> [[${textoForm}]]
                </button>
            </div>
        </div>
    </form>
</div>
