<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"      
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head th:fragment="head">
        <title>Eventos</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
        <script th:src="@{/js/rutinas.js}"></script>
        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>    
        <link th:href="@{/css/estilos.css}" rel="stylesheet"/>
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    </head>

    <body>

        <!-- HEADER -->
        <header th:fragment="header" class="header d-print-none">

            <nav class="navbar navbar-expand-sm p-0">
                <div class="container">

                    <!-- INICIO -->
                    <a th:href="@{/}" class="navbar-brand">Inicio</a>

                    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">

                        <ul class="navbar-nav">

                            <!-- EVENTOS -->
                            <li class="nav-item"
                                sec:authorize="hasAnyRole('ROLE_CLIENTE','ROLE_ORGANIZADOR','ROLE_ADMIN')">

                                <a class="nav-link" th:href="@{/evento/listado}">
                                    Eventos
                                </a>

                            </li>

                            <!-- CONSULTAS SOLO ADMIN -->
                            <li class="nav-item"
                                sec:authorize="hasRole('ROLE_ADMIN')">

                                <a class="nav-link" th:href="@{/consultas}">
                                    Consultas
                                </a>

                            </li>

                            <!-- USUARIO SOLO ADMIN -->
                            <li class="nav-item"
                                sec:authorize="hasRole('ROLE_ADMIN')">

                                <a class="nav-link" th:href="@{/usuario/listado}">
                                    Usuario
                                </a>

                            </li>

                            <!-- ROLES SOLO ADMIN -->
                            <li class="nav-item"
                                sec:authorize="hasRole('ROLE_ADMIN')">

                                <a class="nav-link" th:href="@{/usuario_rol/role}">
                                    Roles
                                </a>

                            </li>

                        </ul>

                        <!-- LOGIN -->
                        <ul class="navbar-nav" sec:authorize="!isAuthenticated()">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/login}">
                                    <i class="fas fa-sign-in-alt"></i>
                                    <span class="ms-1">Login</span>
                                </a>
                            </li>
                        </ul>

                        <!-- LOGOUT -->
                        <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                            <li class="nav-item my-auto">
                                <form method="post" th:action="@{/logout}">
                                    <button class="btn nav-link" type="submit">
                                        <i class="fas fa-sign-out-alt"></i>
                                        <span class="ms-1">Logout</span>
                                    </button>
                                </form>
                            </li>
                        </ul>

                    </div>
                </div>
            </nav>

            <section id="main-header" class="py-2 bg-success text-white">
                <div class="container">
                    <div class="row">
                        <div class="col-md-6"></div>
                    </div>
                </div>
            </section>

        </header>


        <!-- PANTALLA PRINCIPAL -->
        <main class="container mt-5 mb-5">
            <div class="row justify-content-center text-center">
                <div class="col-md-8">

                    <h1 class="display-4 mb-4">
                        Bienvenido
                    </h1>

                    <p class="lead">
                        En este sitio web podrÃ¡s ver cualquiera de los eventos que tenemos.
                    </p>

                </div>
            </div>
        </main>


        <!-- FOOTER -->
        <footer th:fragment="footer" class="p-2 mt-5 bg-info text-white d-print-none">
            <p class="lead text-center">[[#{plantilla.derechos}]] &COPY;</p>
        </footer>


        <!-- TOAST -->
        <section th:fragment="mostrarToast">
            <div aria-live="polite"
                 aria-atomic="true"
                 class="position-fixed top-50 start-50 translate-middle"
                 style="z-index: 1080;">

                <div th:if="${error}" class="toast show" data-bs-autohide="true">
                    <div class="toast-header text-white bg-danger">
                        <strong class="me-auto">Error</strong>
                    </div>
                    <div class="toast-body">
                        [[${error}]]
                    </div>
                </div>

                <div th:if="${todoOk}" class="toast show" data-bs-autohide="true">
                    <div class="toast-header text-white bg-success">
                        <strong class="me-auto">OK</strong>
                    </div>
                    <div class="toast-body">
                        [[${todoOk}]]
                    </div>
                </div>

            </div>
        </section>

    </body>
</html>
