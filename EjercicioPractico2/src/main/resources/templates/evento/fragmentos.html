<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <body>

        <div th:fragment="headerEventos" class="container mt-4 text-center">
            <h2>Gestión de Eventos</h2>
        </div>

        <div th:fragment="botonNuevoEvento" class="container mb-3 text-end">

            <a th:href="@{/evento/nuevo}"
               class="btn btn-primary"
               sec:authorize="hasAnyRole('ROLE_ORGANIZADOR','ROLE_ADMIN')">

                Nuevo Evento
            </a>

        </div>

        <div th:fragment="tablaEventosHeader">

            <table class="table table-striped table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha</th>
                        <th>Capacidad</th>
                        <th>Estado</th>
                        <th sec:authorize="hasAnyRole('ROLE_ORGANIZADOR','ROLE_ADMIN')">
                            Acciones
                        </th>
                    </tr>
                </thead>

                <tbody>

        </div>

        <tr th:fragment="filaEvento(evento)">

            <td th:text="${evento.nombre}"></td>

            <td th:text="${evento.descripcion}"></td>

            <td th:text="${evento.fecha}"></td>

            <td th:text="${evento.capacidad}"></td>

            <td th:text="${evento.activo} ? 'Activo' : 'Inactivo'"></td>

            <td sec:authorize="hasAnyRole('ROLE_ORGANIZADOR','ROLE_ADMIN')">

                <a th:href="@{'/evento/modificar/' + ${evento.id}}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{'/evento/eliminar/' + ${evento.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Desea eliminar este evento?')">
                    Eliminar
                </a>

            </td>

        </tr>

        <div th:fragment="tablaEventosFooter">

                </tbody>
            </table>

        </div>

    </body>
</html>
